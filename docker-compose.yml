services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-createbuckets:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done && mc mb -p local/impact-atlas-local || true",
      ]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      API_PORT: 4000
      MONGODB_URI: mongodb://mongo:27017
      PYTHON_SERVICE_URL: http://python-api:8000
      UPLOAD_DIR: /app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      minio-createbuckets:
        condition: service_completed_successfully
      python-api:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend-replica:
    profiles: ["storage-verification"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      API_PORT: 4000
      MONGODB_URI: mongodb://mongo:27017
      PYTHON_SERVICE_URL: http://python-api:8000
      UPLOAD_DIR: /tmp/replica-uploads
    depends_on:
      mongo:
        condition: service_healthy
      minio-createbuckets:
        condition: service_completed_successfully
      python-api:
        condition: service_healthy
    ports:
      - "4001:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  analytics-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:analytics-worker"]
    env_file:
      - .env
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017
      PYTHON_SERVICE_URL: http://python-api:8000
    depends_on:
      mongo:
        condition: service_healthy
      backend:
        condition: service_healthy
      python-api:
        condition: service_healthy

  python-api:
    build:
      context: ../ia_python_service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../ia_python_service/.env
    environment:
      INTERNAL_SERVICE_TOKEN: ${PYTHON_SERVICE_SHARED_SECRET}
      BACKEND_BASE_URL: http://backend:4000
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/ready').status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  python-worker:
    build:
      context: ../ia_python_service
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.worker.main"]
    env_file:
      - ../ia_python_service/.env
    environment:
      INTERNAL_SERVICE_TOKEN: ${PYTHON_SERVICE_SHARED_SECRET}
      BACKEND_BASE_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  backend_uploads:
  minio_data:

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"

      - run: npm ci

      - name: Lint (ESLint + TypeScript)
        run: npm run lint

      - name: Test
        run: npm test
